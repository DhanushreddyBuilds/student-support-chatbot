<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>
<h2>Conversation Logs</h2>
<table border="1" cellpadding="10">
<tr><th>Message</th><th>Intent</th><th>Confidence</th><th>Time</th></tr>
{% for row in logs %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
</tr>
{% endfor %}
</table>
</body>
</html>
