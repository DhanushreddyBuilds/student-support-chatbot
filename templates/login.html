<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--primary-gradient);
        }

        .auth-box {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .auth-box h2 {
            color: #4a4a4a;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 1rem;
        }

        .auth-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .link {
            display: block;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #667eea;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .error {
            color: red;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .demo-box {
            background: #f0f4ff;
            border: 1px solid #667eea;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #4a4a4a;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-box">
            <h2>🎓 Student Login</h2>
            <form action="/login" method="POST">
                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}
                <div class="input-group">
                    <label>Roll Number</label>
                    <input type="number" name="roll_no" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <div class="demo-box">
                    🔑 <strong>Demo Credentials</strong><br>
                    Roll Number: <strong>1</strong> (any number 1–200)<br>
                    Password: <strong>123</strong>
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>
            <a href="/register" class="link">Create an account</a>
        </div>
    </div>

</body>

</html>
